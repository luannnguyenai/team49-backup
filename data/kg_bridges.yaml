concepts:
  - id: CON-self-attention
    name: Self-Attention
    description: Mechanism where each token/patch attends to all others via Q/K/V.
    canonical_kc_slug: KC-NLP-self-attention

  - id: CON-optimization
    name: Gradient-Based Optimization
    description: First- and second-order methods (SGD, Adam, momentum) for minimizing loss.
    canonical_kc_slug: KC-CV-optimization

  - id: CON-seq2seq-attention
    name: Seq2Seq with Attention
    description: Encoder-decoder architecture with additive or multiplicative attention.
    canonical_kc_slug: KC-CV-seq2seq

  - id: CON-vlm
    name: Vision-Language Models
    description: Models that jointly encode image and text such as CLIP, BLIP, and Flamingo.
    canonical_kc_slug: KC-CV-vlm

  - id: CON-rlhf-ppo
    name: RLHF with PPO
    description: Reinforcement Learning from Human Feedback using Proximal Policy Optimization.
    canonical_kc_slug: KC-NLP-rlhf

  - id: CON-self-supervised-pretrain
    name: Self-Supervised Pretraining
    description: Learning representations without labels via pretext tasks such as MAE, SimCLR, and BERT MLM.
    canonical_kc_slug: KC-CV-self-supervised

  - id: CON-adversarial
    name: Adversarial Robustness
    description: Adversarial examples, PGD attacks, and adversarial training for model robustness.
    canonical_kc_slug: KC-CV-adversarial

