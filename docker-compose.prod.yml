# =============================================================================
# docker-compose.prod.yml — Production overrides
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   bash start.sh --prod
# =============================================================================

services:

  # ── PostgreSQL: ẩn port khỏi host ─────────────────────────────────────────
  db:
    restart: always
    ports: []

  # ── Redis: ẩn port khỏi host ──────────────────────────────────────────────
  redis:
    restart: always
    ports: []

  # ── Backend: production Uvicorn (4 workers, no reload, no source mount) ───
  backend:
    restart: always
    command:
      - sh
      - -c
      - "uv run alembic upgrade head && uv run python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --workers 4 --log-level warning --proxy-headers --forwarded-allow-ips '*'"
    volumes: []
    environment:
      DEBUG: "false"
      DB_ECHO: "false"
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "20"
      LOG_LEVEL: "WARNING"

  # ── Frontend: production build (no source mount, no hot reload) ───────────
  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner        # prod: full build với standalone output
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        BUILDKIT_INLINE_CACHE: "1"
    command: node server.js
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: ""
    volumes: []
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
