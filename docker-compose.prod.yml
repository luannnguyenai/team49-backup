# =============================================================================
# docker-compose.prod.yml — Production overrides
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Or via Makefile:
#   make deploy
# =============================================================================

services:

  # ── PostgreSQL: no host port exposure ─────────────────────────────────────
  db:
    restart: always
    ports: []                  # internal only — never expose DB to internet

  # ── Redis: no host port exposure ──────────────────────────────────────────
  redis:
    restart: always
    ports: []                  # internal only

  # ── Backend: production Uvicorn (no hot-reload, no source mount) ───────────
  backend:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        BUILDKIT_INLINE_CACHE: "1"
    # Override dev command — no --reload, 4 workers
    command: >
      python -m uvicorn src.api.app:app
        --host 0.0.0.0 --port 8000
        --workers 4
        --log-level warning
        --proxy-headers
        --forwarded-allow-ips "*"
    volumes: []                # no source mounts in prod
    environment:
      DEBUG: "false"
      DB_ECHO: "false"
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "20"
      LOG_LEVEL: "WARNING"

  # ── Frontend: rebuild with production API URL baked in ────────────────────
  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.yourdomain.com}
        BUILDKIT_INLINE_CACHE: "1"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.yourdomain.com}
