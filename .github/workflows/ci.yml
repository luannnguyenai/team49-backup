# =============================================================================
# CI — Lint + Test on every pull request
# =============================================================================
# Triggers:  push to any branch + pull_request targeting main
# Jobs:
#   lint-backend  — ruff (lint + format check)
#   test-backend  — pytest with a real PostgreSQL service container
#   lint-frontend — ESLint
#   typecheck-fe  — tsc --noEmit
# =============================================================================

name: CI

on:
  push:
    branches-ignore:
      - main           # main is handled by deploy.yml
  pull_request:
    branches:
      - main

# Cancel in-progress runs on the same PR / branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — lint
  # ---------------------------------------------------------------------------
  lint-backend:
    name: "Backend · Lint (ruff)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/ scripts/

      - name: Ruff format check
        run: ruff format --check src/ scripts/


  # ---------------------------------------------------------------------------
  # Backend — tests
  # ---------------------------------------------------------------------------
  test-backend:
    name: "Backend · Test (pytest)"
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       test_ai_learning
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:     postgresql+asyncpg://test:test@localhost:5432/test_ai_learning
      REDIS_URL:        redis://localhost:6379/0
      SECRET_KEY:       ci_test_secret_key_min_32_chars_long
      ALGORITHM:        HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS:   7

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --junitxml=reports/junit.xml \
            --cov=src \
            --cov-report=xml:reports/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: reports/


  # ---------------------------------------------------------------------------
  # Frontend — lint
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: "Frontend · Lint (ESLint)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint


  # ---------------------------------------------------------------------------
  # Frontend — TypeScript
  # ---------------------------------------------------------------------------
  typecheck-frontend:
    name: "Frontend · TypeScript"
    runs-on: ubuntu-latest
    needs: lint-frontend

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Next.js build (dry-run)
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
