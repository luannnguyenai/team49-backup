<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Lecture Q&A</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --dim: #94a3b8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            padding: 0.75rem 1.5rem; background: rgba(15,23,42,0.95);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        header h2 { color: var(--accent); font-size: 1.1rem; }
        select { background: var(--card); color: white; border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 6px; }

        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 0.75rem; padding: 0.75rem; flex: 1; overflow: hidden; }
        .video-section { background: var(--card); border-radius: 12px; padding: 0.75rem; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.5rem; }
        video { width: 100%; border-radius: 8px; }
        .video-info { display: flex; justify-content: space-between; color: var(--dim); font-size: 0.85rem; }

        .chat-section { display: flex; flex-direction: column; background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .chat-history { flex: 1; padding: 0.75rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; }
        .msg { padding: 0.6rem 0.8rem; border-radius: 10px; max-width: 92%; line-height: 1.6; font-size: 0.9rem; }
        .msg-user { align-self: flex-end; background: var(--accent); color: #0f172a; font-weight: 500; white-space: pre-wrap; }
        .msg-ai { align-self: flex-start; background: #334155; width: 95%; }
        /* Markdown inside AI messages */
        .msg-ai h1,.msg-ai h2,.msg-ai h3,.msg-ai h4 { margin: 0.5em 0 0.3em; color: var(--accent); }
        .msg-ai h3 { font-size: 1rem; }
        .msg-ai p { margin: 0.3em 0; }
        .msg-ai ul,.msg-ai ol { margin: 0.3em 0 0.3em 1.2em; }
        .msg-ai li { margin: 0.15em 0; }
        .msg-ai code { background: rgba(0,0,0,0.3); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.85em; }
        .msg-ai pre { background: rgba(0,0,0,0.3); padding: 0.6em; border-radius: 6px; overflow-x: auto; margin: 0.4em 0; }
        .msg-ai pre code { background: none; padding: 0; }
        .msg-ai blockquote { border-left: 3px solid var(--accent); padding-left: 0.6em; margin: 0.4em 0; color: var(--dim); }
        .msg-ai strong { color: var(--accent); }
        .msg-ai .katex { font-size: 1em; }
        .msg-ai .katex-display { margin: 0.5em 0; overflow-x: auto; }

        .thinking-indicator { color: var(--accent); font-style: italic; font-size: 0.85rem; }
        .thinking-indicator::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        .chat-input { padding: 0.75rem; border-top: 1px solid var(--border); }
        textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.6rem; border-radius: 8px; resize: none; outline: none; font-family: inherit; font-size: 0.9rem; }
        textarea:focus { border-color: var(--accent); }
        button {
            margin-top: 0.5rem; width: 100%; background: var(--accent); color: #0f172a;
            border: none; padding: 0.6rem; border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .error { color: #ef4444; }

        /* Rating Buttons */
        .rating-bar { display: flex; gap: 0.5rem; margin-top: 0.5rem; padding-top: 0.4rem; border-top: 1px solid rgba(255,255,255,0.08); }
        .rating-btn {
            all: unset; cursor: pointer; font-size: 1.1rem; padding: 0.25rem 0.5rem;
            border-radius: 6px; transition: all 0.2s; opacity: 0.5;
        }
        .rating-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); transform: scale(1.15); }
        .rating-btn.selected { opacity: 1; transform: scale(1.15); }
        .rating-btn.selected-up { background: rgba(74,222,128,0.2); }
        .rating-btn.selected-down { background: rgba(248,113,113,0.2); }
        .rating-btn:disabled { cursor: default; transform: none; }

        /* Moderation / Blocked Message */
        .msg-blocked {
            align-self: flex-start; background: rgba(245,158,11,0.12);
            border: 1px solid rgba(245,158,11,0.3); color: #fbbf24;
            max-width: 92%; padding: 0.6rem 0.8rem; border-radius: 10px;
            font-size: 0.9rem; line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        <h2>🎓 AI Tutor</h2>
        <select id="lectureSelect"></select>
    </header>

    <div class="container">
        <div class="video-section">
            <video id="mainVideo" controls></video>
            <div class="video-info">
                <span id="videoTitle">Chọn bài giảng...</span>
                <span id="currentTime">00:00:00</span>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-history" id="chatHistory">
                <div class="msg msg-ai">Chào bạn! Hãy đặt câu hỏi bất cứ lúc nào trong khi xem video. Tôi sẽ tự động biết bạn đang thắc mắc tại giây thứ bao nhiêu.</div>
            </div>
            <div class="chat-input">
                <textarea id="userInput" placeholder="Hỏi Gia sư..." rows="2"></textarea>
                <button id="sendBtn">Hỏi Gia sư</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const lectureSelect = document.getElementById('lectureSelect');
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const timeDisplay = document.getElementById('currentTime');
        let lectures = [];

        // Load lectures
        fetch('/api/lectures').then(r => r.json()).then(data => {
            lectures = data;
            lectureSelect.innerHTML = data.map(l => `<option value="${l.id}">${l.title}</option>`).join('');
            if (data.length) selectLecture(data[0].id);
        });

        function selectLecture(id) {
            const lec = lectures.find(l => l.id === id);
            if (lec) {
                video.src = `/${lec.video_url}`;
                document.getElementById('videoTitle').innerText = lec.title;
                video.load();
            }
        }
        lectureSelect.addEventListener('change', e => selectLecture(e.target.value));
        video.addEventListener('timeupdate', () => {
            timeDisplay.innerText = new Date(video.currentTime * 1000).toISOString().substr(11, 8);
        });

        function captureFrame() {
            try {
                const c = document.createElement('canvas');
                c.width = video.videoWidth; c.height = video.videoHeight;
                c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
                return c.toDataURL('image/jpeg', 0.7).split(',')[1];
            } catch { return null; }
        }

        // Enter key sends
        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
        });

        sendBtn.addEventListener('click', async () => {
            const q = userInput.value.trim();
            if (!q) return;

            const ts = video.currentTime;
            const lid = lectureSelect.value;
            const img = captureFrame();

            // User message
            const uMsg = document.createElement('div');
            uMsg.className = 'msg msg-user';
            uMsg.innerText = q;
            chatHistory.appendChild(uMsg);
            userInput.value = '';
            sendBtn.disabled = true;

            // AI message with thinking and content separation
            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg msg-ai';
            
            const statusDiv = document.createElement('div');
            statusDiv.className = 'thinking-indicator';
            statusDiv.style.whiteSpace = 'pre-wrap';
            statusDiv.style.marginBottom = '0.5rem';
            statusDiv.innerText = '🧠 Thinking...\n';
            
            const contentDiv = document.createElement('div');
            
            aiMsg.appendChild(statusDiv);
            aiMsg.appendChild(contentDiv);
            chatHistory.appendChild(aiMsg);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const resp = await fetch('/api/lectures/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lecture_id: lid, current_timestamp: ts, question: q, image_base64: img })
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let rawText = '';
                let hasError = false;
                let qaId = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    for (const line of text.split('\n')) {
                        if (!line.trim()) continue;
                        try {
                            const data = JSON.parse(line.trim());
                            if (data.blocked) {
                                // Guardrail blocked this question
                                statusDiv.remove();
                                contentDiv.remove();
                                aiMsg.className = 'msg msg-blocked';
                                aiMsg.innerText = data.message || '⛔ Câu hỏi ngoài phạm vi bài giảng.';
                                hasError = true;
                                break;
                            }
                            if (data.e) {
                                contentDiv.innerHTML = `<span class="error">⚠️ ${data.e}</span>`;
                                hasError = true;
                                break;
                            }
                            if (data.status) {
                                statusDiv.innerText += data.status;
                            }
                            if (data.qa_id) {
                                qaId = data.qa_id;
                            }
                            if (data.a) {
                                rawText += data.a;
                                // Live preview: show raw text while streaming
                                contentDiv.innerText = rawText;
                                // Dim status div once actual answer starts flowing
                                statusDiv.style.opacity = '0.6';
                                statusDiv.style.fontSize = '0.8rem';
                                statusDiv.classList.remove('thinking-indicator');
                            }
                        } catch {}
                    }
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                    if (hasError) break;
                }

                // Render Markdown + LaTeX after stream completes
                if (!hasError && rawText) {
                    contentDiv.innerHTML = renderMarkdownLatex(rawText);
                } else if (!hasError) {
                    contentDiv.innerText = 'Không nhận được phản hồi từ AI.';
                }

                // Add rating buttons if we got a qa_id
                if (qaId) {
                    const ratingBar = document.createElement('div');
                    ratingBar.className = 'rating-bar';
                    ratingBar.innerHTML = `
                        <button class="rating-btn" data-rating="1" title="Hữu ích">👍</button>
                        <button class="rating-btn" data-rating="-1" title="Chưa tốt">👎</button>
                    `;
                    aiMsg.appendChild(ratingBar);

                    ratingBar.querySelectorAll('.rating-btn').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const rating = parseInt(btn.dataset.rating);
                            try {
                                await fetch(`/api/history/${qaId}/rate`, {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({ rating })
                                });
                                // Highlight selected, disable all
                                ratingBar.querySelectorAll('.rating-btn').forEach(b => {
                                    b.disabled = true;
                                    b.classList.remove('selected', 'selected-up', 'selected-down');
                                });
                                btn.classList.add('selected', rating === 1 ? 'selected-up' : 'selected-down');
                            } catch (err) {
                                console.error('Rating failed:', err);
                            }
                        });
                    });
                }

            } catch (err) {
                contentDiv.innerHTML = `<span class="error">⚠️ Lỗi kết nối: ${err.message}</span>`;
            }
            sendBtn.disabled = false;
            chatHistory.scrollTop = chatHistory.scrollHeight;
        });

        // Markdown + LaTeX renderer
        function renderMarkdownLatex(text) {
            // 1. Protect display math $$...$$ 
            let i = 0;
            const blocks = {};
            text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, math) => {
                const key = `%%BLOCK${i++}%%`;
                try { blocks[key] = katex.renderToString(math.trim(), { displayMode: true, throwOnError: false }); }
                catch { blocks[key] = `<code>${math}</code>`; }
                return key;
            });
            // 2. Protect inline math $...$
            const inlines = {};
            text = text.replace(/\$([^$\n]+?)\$/g, (_, math) => {
                const key = `%%INLINE${i++}%%`;
                try { inlines[key] = katex.renderToString(math.trim(), { displayMode: false, throwOnError: false }); }
                catch { inlines[key] = `<code>${math}</code>`; }
                return key;
            });
            // 3. Render Markdown
            let html = marked.parse(text);
            // 4. Restore math
            for (const [k, v] of Object.entries(blocks)) html = html.replace(k, `<div class="katex-display">${v}</div>`);
            for (const [k, v] of Object.entries(inlines)) html = html.replace(k, v);
            return html;
        }
    </script>
</body>
</html>
