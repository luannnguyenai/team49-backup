# =============================================================================
# docker-compose.yml — Development configuration
# =============================================================================
# Usage: docker compose up --build -d

name: ai-adaptive-learning

services:

  # ── Backend: FastAPI + Uvicorn ─────────────────────────────────────────────
  backend:
    build: .
    container_name: al_backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123secure}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_learning}
      - SECRET_KEY=${SECRET_KEY:-your_secret_key_minimum_32_characters_long}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEBUG=true
    volumes:
      - .:/app
      - /app/deps
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - al_net

  # ── Database: PostgreSQL 16 ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: al_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123secure}
      - POSTGRES_DB=${POSTGRES_DB:-ai_learning}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - al_db_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_learning}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - al_net

  # ── Cache/Rate-Limit: Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: al_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123secure}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - al_net

  # ── Frontend: Next.js ──────────────────────────────────────────────────────
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: al_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - al_net

  # ── Legacy UI: Streamlit (Optional) ────────────────────────────────────────
  streamlit:
    build: .
    container_name: al_streamlit
    command: streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - .:/app
    networks:
      - al_net

networks:
  al_net:
    driver: bridge

volumes:
  al_db_data:
