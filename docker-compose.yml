# =============================================================================
# docker-compose.yml — Development stack
# =============================================================================
# Usage: docker compose --env-file .env up --build
#
# Services: api (FastAPI) · streamlit · db (PostgreSQL 16) · redis (Redis 7)

name: ai-learning

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ---------------------------------------------------------------------------
services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ai_tutor_db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-ai_learning}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_learning}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_tutor_redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build: .
    container_name: ai_tutor_api
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATABASE_URL:                 postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_learning}
      SECRET_KEY:                   ${SECRET_KEY:-change_me_in_production}
      ALGORITHM:                    ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES:  ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS:    ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      RATE_LIMIT_LOGIN_PER_MINUTE:  ${RATE_LIMIT_LOGIN_PER_MINUTE:-5}
      GEMINI_API_KEY:               ${GEMINI_API_KEY}
      DEFAULT_MODEL:                ${DEFAULT_MODEL:-gemini-3-flash-preview}
      DB_ECHO:                      ${DB_ECHO:-false}
      DB_POOL_SIZE:                 ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW:              ${DB_MAX_OVERFLOW:-20}
      PYTHONPATH:                   /app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Streamlit UI (optional) ────────────────────────────────────────────────
  streamlit:
    build: .
    container_name: ai_tutor_streamlit
    restart: unless-stopped
    logging: *default-logging
    command: ["uv", "run", "streamlit", "run", "src/ui/app.py"]
    environment:
      DATABASE_URL:   postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_learning}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEFAULT_MODEL:  ${DEFAULT_MODEL:-gemini-3-flash-preview}
      PYTHONPATH:     /app
    ports:
      - "8501:8501"
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

# ---------------------------------------------------------------------------
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
networks:
  backend_net:
    driver: bridge
