# =============================================================================
# docker-compose.yml — Development stack (default)
# =============================================================================
# Usage:
#   docker compose up -d                                          # dev mode (hot reload)
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d  # production
#   bash start.sh           # dev
#   bash start.sh --prod    # production
#   bash start.sh --rebuild # rebuild images (khi thêm package mới)
# =============================================================================

name: ai-adaptive-learning

# ---------------------------------------------------------------------------
# Shared environment anchors
# ---------------------------------------------------------------------------
x-db-env: &db-env
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
  POSTGRES_DB: ${POSTGRES_DB:-ai_learning}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change_me_strong_password}@db:5432/${POSTGRES_DB:-ai_learning}
  REDIS_URL: redis://:${REDIS_PASSWORD:-redis123secure}@redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-dev_secret_key_min_32_chars_change_me}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  RATE_LIMIT_LOGIN_PER_MINUTE: ${RATE_LIMIT_LOGIN_PER_MINUTE:-5}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-4o-mini}
  FAST_MODEL: ${FAST_MODEL:-gpt-4o-mini}
  MODEL_PROVIDER: ${MODEL_PROVIDER:-openai}
  DB_ECHO: ${DB_ECHO:-false}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
  DEBUG: "true"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

# ---------------------------------------------------------------------------
services:

  # ── PostgreSQL 16 + pgvector ───────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: al_db
    restart: unless-stopped
    environment:
      <<: *db-env
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - al_db_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_learning}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - al_internal

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: al_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-redis123secure}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
        --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - al_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123secure}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - al_internal

  # ── FastAPI backend (dev: source mount + auto-reload) ─────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: al_backend
    restart: unless-stopped
    command:
      - sh
      - -c
      - "uv run alembic upgrade head && uv run python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --workers 1 --reload"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      <<: *backend-env
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode() == 200 else 1)"
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - al_internal
      - al_external

  # ── Next.js frontend (dev: volume mount + hot reload) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps          # dev: chỉ install dependencies, không build
    container_name: al_frontend
    restart: unless-stopped
    command: npm run dev    # dev: Next.js dev server với hot reload
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://backend:8000
      WATCHPACK_POLLING: "true"   # bắt buộc cho hot reload trên Windows/WSL
    volumes:
      - ./frontend:/app           # mount code từ host → hot reload
      - /app/node_modules         # giữ node_modules trong container
      - /app/.next                # giữ .next build cache trong container
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - al_internal
      - al_external

# ---------------------------------------------------------------------------
networks:
  al_internal:
    driver: bridge
  al_external:
    driver: bridge

# ---------------------------------------------------------------------------
volumes:
  al_db_data:
    driver: local
  al_redis_data:
    driver: local
