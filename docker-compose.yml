# =============================================================================
# docker-compose.yml — Development stack
# =============================================================================
# Usage:
#   docker compose up -d          # start all services
#   docker compose up -d backend  # start only backend
#   docker compose logs -f        # tail logs
#   docker compose down -v        # stop + remove volumes
# =============================================================================

name: ai-adaptive-learning

# ---------------------------------------------------------------------------
# Shared environment anchors (reduces duplication)
# ---------------------------------------------------------------------------
x-db-env: &db-env
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123secure}
  POSTGRES_DB: ${POSTGRES_DB:-ai_learning}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123secure}@db:5432/${POSTGRES_DB:-ai_learning}
  REDIS_URL: redis://:${REDIS_PASSWORD:-redis123secure}@redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-dev_secret_key_min_32_chars_change_me}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  RATE_LIMIT_LOGIN_PER_MINUTE: ${RATE_LIMIT_LOGIN_PER_MINUTE:-5}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-3-flash-preview}
  DB_ECHO: ${DB_ECHO:-false}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
  DEBUG: "true"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

# ---------------------------------------------------------------------------
services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: al_db
    restart: unless-stopped
    environment:
      <<: *db-env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - al_db_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_learning}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - al_internal

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: al_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-redis123secure}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
        --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - al_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123secure}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - al_internal

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime # use the runtime stage
    container_name: al_backend
    restart: unless-stopped
    command: >
      uv run python -m uvicorn src.api.app:app
        --host 0.0.0.0 --port 8000
        --workers 2
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      <<: *backend-env
    volumes:
      - .:/app
      - /app/.venv  # mask host .venv with anonymous volume (Linux vs macOS)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - al_internal
      - al_external # exposes HTTP to host

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        API_INTERNAL_URL: http://backend:8000
    container_name: al_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # In-container API calls go through backend service name
      API_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health 2>/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - al_internal
      - al_external

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  al_internal:
    # Service-to-service only — not reachable from host
    driver: bridge
    internal: false # set true for full isolation; false lets services reach internet (for LLM APIs)
  al_external:
    # Bridges backend + frontend to host ports
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  al_db_data:
    driver: local
  al_redis_data:
    driver: local
